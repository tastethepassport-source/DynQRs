<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title></title>
  <style>
    body {
      margin: 0;
    }
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #385245;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 60px 0 80px 0;
      box-sizing: border-box;
      z-index: 9999;
    }
    .logo-img {
      width: 200px;
      object-fit: contain;
    }
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .star-spinner {
      width: 250px;
      height: 250px;
      animation: spin 1.4s linear infinite;
      transform-origin: 50% 50%;
    }
    .loading-text {
      color: #ffffff;
      font-size: 17px;
      font-family: sans-serif;
      margin: 0;
      opacity: 0.85;
      letter-spacing: 0.04em;
    }
    .dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <img class="logo-img" src="https://cdn.shopify.com/s/files/1/0901/7304/7049/files/LOGO_PANTALLA_CARGA.png?v=1777032492" alt="Logo"/>
    <div class="spinner-wrap">
      <svg class="star-spinner" id="starSvg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <polygon id="starPoly" fill="#f2af3c"/>
      </svg>
      <p class="loading-text">Redirigiendo a la app<span class="dots"></span></p>
    </div>
  </div>

  <script>
    (function() {
      const cx = 50, cy = 50, outerR = 45, innerR = 19, points = 5;
      const pts = [];
      for (let i = 0; i < points * 2; i++) {
        const angle = (Math.PI / points) * i - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        pts.push((cx + r * Math.cos(angle)).toFixed(3) + ',' + (cy + r * Math.sin(angle)).toFixed(3));
      }
      document.getElementById('starPoly').setAttribute('points', pts.join(' '));
    })();

    const AS_URL_BASE = "https://script.google.com/macros/s/AKfycbwMIIfAmuavM2wzMEHbBs3Mqo9H2QVEv5DDs7FTYO6alcBDkxxT23EllLHEOeADInfvuw/exec";

    var url = document.location.href;
    var k = url.substr(url.lastIndexOf("k=")+2);

    if (k) {
      fetch(AS_URL_BASE + '?k=' + k)
        .then(r => r.text())
        .then((r) => {
          console.log(r);
          if (r) {
            document.location.replace(r);
          }
        })
        .catch(err => console.log(err));
    }
  </script>

</body>
</html>
